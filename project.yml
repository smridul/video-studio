name: VideoStudio
options:
  bundleIdPrefix: com.mridulshrivastava
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "SPB6M3V9N2"

targets:
  VideoStudio:
    type: application
    platform: iOS
    sources:
      - VideoStudio
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mridulshrivastava.video-studio
        PRODUCT_NAME: VideoStudio
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Video Studio
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"

schemes:
  VideoStudio:
    build:
      targets:
        VideoStudio: all
    run:
      config: Debug
