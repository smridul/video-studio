name: VideoStudio
options:
  bundleIdPrefix: com.mridulshrivastava
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "SPB6M3V9N2"

targets:
  VideoStudio:
    type: application
    platform: iOS
    sources:
      - VideoStudio
    settings:
      base:
        INFOPLIST_FILE: VideoStudio/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mridulshrivastava.video-studio
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  VideoStudio:
    build:
      targets:
        VideoStudio: all
    run:
      config: Debug
